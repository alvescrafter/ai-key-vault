<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Key Vault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f0f1a; color: #e0e0e0; }
    .container { padding: 16px; }
    h1 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    .lock-icon { font-size: 48px; text-align: center; margin: 20px 0; }
    input[type="password"], input[type="text"], input[type="url"] {
      width: 100%; padding: 10px; margin: 6px 0; background: #1a1a2e;
      border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px;
    }
    input::placeholder { color: #666; }
    input:focus { outline: none; border-color: #4361ee; }
    select {
      width: 100%; padding: 10px; margin: 6px 0; background: #1a1a2e;
      border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px;
    }
    select:focus { outline: none; border-color: #4361ee; }
    .btn {
      width: 100%; padding: 10px; margin: 6px 0; border: none; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s;
    }
    .btn-primary { background: #4361ee; color: white; }
    .btn-primary:hover { background: #3a56d4; }
    .btn-secondary { background: #16213e; color: #e0e0e0; border: 1px solid #333; }
    .btn-secondary:hover { background: #1a2a4a; }
    .btn-danger { background: #e63946; color: white; }
    .btn-danger:hover { background: #c1313d; }
    .btn-small { padding: 6px 12px; font-size: 12px; width: auto; }
    .copy-btn { background: #4361ee; color: white; }
    .copy-btn:hover { background: #3a56d4; }
    .copy-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .key-card {
      background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
      padding: 12px; margin: 8px 0;
    }
    .key-card .label { font-weight: 600; }
    .key-card .meta { color: #888; font-size: 12px; margin-top: 4px; }
    .key-card .actions { margin-top: 8px; display: flex; gap: 8px; }
    .tag {
      display: inline-block; background: #0f3460; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; margin-right: 4px; color: #7ec8e3;
    }
    #add-form { display: none; }
    #add-form.visible { display: block; }
    .error { color: #e63946; font-size: 13px; margin: 6px 0; }
    .info { color: #7ec8e3; font-size: 12px; margin: 6px 0; }
    .warning { color: #f4a261; font-size: 12px; margin: 6px 0; }
    .divider { border-top: 1px solid #333; margin: 12px 0; }
    .session-badge {
      display: inline-block; background: #2d6a4f; padding: 2px 8px; border-radius: 4px;
      font-size: 10px; color: #95d5b2; margin-left: 6px;
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
    }
    .header-row h2 { font-size: 16px; }
    label { font-size: 12px; color: #888; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <a href="https://buy.stripe.com/5kQ9AVgCY5dJ77TbIA9R600" target="_blank" style="color:#f4a261;text-decoration:none;font-size:12px;font-weight:600;">☕ Donate</a>
      <a href="https://github.com/alvescrafter/ai-key-vault" target="_blank" style="color:#7ec8e3;text-decoration:none;font-size:12px;font-weight:600;">📖 Readme</a>
    </div>
    <h1>🔐 AI Key Vault</h1>

    <!-- Setup / Unlock Section -->
    <div id="auth-section">
      <div class="lock-icon">🔒</div>
      <form id="auth-form">
        <input type="password" id="master-password" placeholder="Enter master password" required autofocus>
        <input type="password" id="confirm-password" placeholder="Confirm password (new vault only)" style="display:none">
        <div id="auth-error" class="error"></div>
        <button type="submit" class="btn btn-primary" id="auth-btn">Unlock</button>
      </form>
    </div>

    <!-- Vault Section (shown after unlock) -->
    <div id="vault-section" style="display:none">
      <div class="header-row">
        <h2>Your Keys</h2>
        <div>
          <span id="session-badge" class="session-badge" style="display:none">Session</span>
          <button id="lock-btn" class="btn btn-secondary btn-small">🔒 Lock</button>
        </div>
      </div>
      <div id="keys-list"></div>
      <button id="add-key-btn" class="btn btn-primary" style="margin-top:12px;">+ Add Key</button>
      <div class="divider"></div>
      <div class="info" style="font-size:11px;">
        Auto-locks after 30 minutes of inactivity.<br>
        Press Ctrl+Shift+K on any AI site to inject keys.
      </div>
    </div>

    <!-- Add Key Form -->
    <div id="add-form">
      <div class="header-row">
        <h2>Add API Key</h2>
        <button id="cancel-add-btn" class="btn btn-secondary btn-small">Cancel</button>
      </div>
      <label>Provider</label>
      <select id="key-provider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="google">Google (Gemini)</option>
        <option value="groq">Groq</option>
        <option value="deepseek">DeepSeek</option>
        <option value="custom">Custom</option>
      </select>
      <label>Label</label>
      <input type="text" id="key-label" placeholder="e.g., My OpenAI Key">
      <label>API Key</label>
      <input type="password" id="key-value" placeholder="sk-..." required>
      <label>Auto-inject on these sites (comma-separated)</label>
      <input type="text" id="key-sites" placeholder="chat.openai.com, platform.openai.com">
      <div id="add-error" class="error"></div>
      <div id="add-warning" class="warning" style="display:none"></div>
      <button id="save-key-btn" class="btn btn-primary">Save Key</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
